name: Build Flutter App

on:
  push:
    branches: [ main, rust, dev, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Download FFmpeg for Windows
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $outputPath = "$env:TEMP\ffmpeg.zip"
          Write-Host "Downloading FFmpeg..."
          curl.exe -L -o $outputPath $ffmpegUrl
          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $outputPath -DestinationPath "$env:TEMP\ffmpeg" -Force
          New-Item -ItemType Directory -Force -Path "build\windows\x64\runner\Release\resources\windows"
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName "build\windows\x64\runner\Release\resources\windows\ffmpeg.exe"
          Write-Host "FFmpeg ready"
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-windows
          path: build/windows/x64/runner/Release/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Download FFmpeg for macOS
        run: |
          mkdir -p build/macos/Build/Products/Release/resources/macos
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          unzip ffmpeg.zip -d ffmpeg_extract
          cp ffmpeg_extract/ffmpeg build/macos/Build/Products/Release/resources/macos/ffmpeg
          chmod +x build/macos/Build/Products/Release/resources/macos/ffmpeg
          rm -rf ffmpeg.zip ffmpeg_extract
          echo "FFmpeg ready"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build macOS
        run: flutter build macos --release
        
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-macos
          path: build/macos/Build/Products/Release/
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets/ffmpeg/android
          curl -L -o ffmpeg-kit.tar.xz "https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0-2/ffmpeg-kit-android-arm64-v8a.tar.xz"
          tar -xf ffmpeg-kit.tar.xz
          find . -name "ffmpeg" -type f -exec cp {} assets/ffmpeg/android/ffmpeg \;
          chmod +x assets/ffmpeg/android/ffmpeg
          rm -rf ffmpeg-kit.tar.xz ffmpeg-kit*
          echo "FFmpeg ready"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build Android APK
        run: flutter build apk --release
        
      - name: Build Android App Bundle
        run: flutter build appbundle --release
        
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Download FFmpeg for iOS
        run: |
          mkdir -p assets/ffmpeg/ios
          curl -L -o ffmpeg-kit.tar.xz "https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0-2/ffmpeg-kit-ios-arm64-static.tar.xz"
          tar -xf ffmpeg-kit.tar.xz
          find . -name "ffmpeg" -type f -exec cp {} assets/ffmpeg/ios/ffmpeg \;
          chmod +x assets/ffmpeg/ios/ffmpeg
          rm -rf ffmpeg-kit.tar.xz ffmpeg-kit*
          echo "FFmpeg ready"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        
      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-ios
          path: build/ios/iphoneos/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          
      - name: Download FFmpeg for Linux
        run: |
          mkdir -p build/linux/x64/release/bundle/resources/linux
          curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar -xf ffmpeg.tar.xz
          find . -name "ffmpeg" -type f -exec cp {} build/linux/x64/release/bundle/resources/linux/ffmpeg \;
          chmod +x build/linux/x64/release/bundle/resources/linux/ffmpeg
          rm -rf ffmpeg.tar.xz ffmpeg-*
          echo "FFmpeg ready"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build Linux
        run: flutter build linux --release
        
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-linux
          path: build/linux/x64/release/bundle/
          retention-days: 7

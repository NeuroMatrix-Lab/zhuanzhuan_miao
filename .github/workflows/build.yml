name: Build Flutter App

on:
  push:
    branches: [ main, rust, dev, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-windows
          path: build/windows/x64/runner/Release/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build macOS
        run: flutter build macos --release
        
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-macos
          path: build/macos/Build/Products/Release/
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets/ffmpeg/android
          curl -L -o ffmpeg-arm64.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz"
          tar -xf ffmpeg-arm64.tar.xz
          find . -name "ffmpeg" -type f -executable -exec cp {} assets/ffmpeg/android/ffmpeg \;
          chmod +x assets/ffmpeg/android/ffmpeg
          rm -rf ffmpeg-arm64.tar.xz ffmpeg-*
          echo "FFmpeg ready for Android"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build Android APK
        run: flutter build apk --release
        
      - name: Build Android App Bundle
        run: flutter build appbundle --release
        
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
          
      - name: Download FFmpeg for iOS
        run: |
          mkdir -p assets/ffmpeg/ios
          curl -L -o ffmpeg-ios.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz"
          tar -xf ffmpeg-ios.tar.xz
          find . -name "ffmpeg" -type f -executable -exec cp {} assets/ffmpeg/ios/ffmpeg \;
          chmod +x assets/ffmpeg/ios/ffmpeg
          rm -rf ffmpeg-ios.tar.xz ffmpeg-*
          echo "FFmpeg ready for iOS"
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        
      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-ios
          path: build/ios/iphoneos/
          retention-days: 7
